name: Integrated Smoke

on:
  pull_request:
    paths:
      - 'app/**'
      - 'migrations/**'
      - 'scripts/**'
      - 'alembic.ini'
      - 'tests/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.env.example'
      - 'docker-compose.yml'
      - '.github/workflows/ci-integrated.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'migrations/**'
      - 'scripts/**'
      - 'alembic.ini'
      - 'tests/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.env.example'
      - 'docker-compose.yml'
      - '.github/workflows/ci-integrated.yml'
  workflow_dispatch:

jobs:
  integrated-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.11' }}
      DATABASE_URL: sqlite:///./smoke.db
      ALEMBIC_SKIP: 'true'
      AUTH_SECRET_KEY: ci-test-auth-secret-key
      ANTHROPIC_API_KEY: test-key
      CONNECTOR_TOKEN_ENCRYPTION_KEY: 6T-VEv2ueVr0VriM8n4QfSMqkA9R7sQfD_gJK4jI8Y8=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &

      - name: Run smoke script
        run: bash frontend/tests/e2e/smoke.sh

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          if-no-files-found: ignore
