name: Docker Validate

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - 'requirements.txt'
      - '.github/workflows/docker-validate.yml'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - 'requirements.txt'
      - '.github/workflows/docker-validate.yml'
  workflow_dispatch:

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        if: ${{ hashFiles('docker-compose.yml') != '' }}
        run: docker compose -f docker-compose.yml config

      - name: Build Docker image
        run: docker build -t timebot-ci:latest .
