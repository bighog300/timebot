version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: doc-db
    environment:
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
      POSTGRES_DB: documents
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # host:container (5433 avoids common local Postgres 5432 conflicts)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuser -d documents"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-network

  redis:
    image: redis:7-alpine
    container_name: doc-redis
    ports:
      - "6379:6379" # host:container
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc-qdrant
    ports:
      - "6335:6333" # host:container (6335 avoids local 6333 conflicts)
      - "6336:6334" # host:container (gRPC)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - doc-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-organizer
    command: ["./scripts/start-app.sh"]
    ports:
      - "8001:8000" # host:container (8001 avoids common local 8000 conflicts; frontend should call :8001)
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_PATH=/app/data/uploads
      - PROCESSED_PATH=/app/data/processed
      - STORAGE_PATH=/app/data
      - DATA_DIR=/app/data
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - UPLOAD_DIR=/app/uploads
      - ARTIFACT_DIR=/app/artifacts
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-dev-insecure-change-me}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - INITIAL_ADMIN_NAME=${INITIAL_ADMIN_NAME:-Timebot Admin}
    volumes:
      - timebot_data:/app/data
      - timebot_uploads:/app/uploads
      - timebot_artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - doc-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info -Q ingestion,ai_analysis,maintenance
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_PATH=/app/data/uploads
      - PROCESSED_PATH=/app/data/processed
      - STORAGE_PATH=/app/data
      - DATA_DIR=/app/data
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - UPLOAD_DIR=/app/uploads
      - ARTIFACT_DIR=/app/artifacts
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-dev-insecure-change-me}
    volumes:
      - timebot_data:/app/data
      - timebot_uploads:/app/uploads
      - timebot_artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - doc-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-flower
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555" # host:container
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  timebot_data:
  timebot_uploads:
  timebot_artifacts:

networks:
  doc-network:
    driver: bridge
