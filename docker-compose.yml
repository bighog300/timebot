version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: doc-db
    environment:
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
      POSTGRES_DB: documents
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuser -d documents"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-network

  redis:
    image: redis:7-alpine
    container_name: doc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-organizer
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_PATH=/app/data/uploads
      - PROCESSED_PATH=/app/data/processed
      - STORAGE_PATH=/app/data
      - ALLOWED_ORIGINS=*
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info -Q documents,maintenance
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_PATH=/app/data/uploads
      - PROCESSED_PATH=/app/data/processed
      - STORAGE_PATH=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://docuser:docpass@db:5432/documents
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - doc-network

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-flower
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - doc-network

volumes:
  postgres_data:
  redis_data:

networks:
  doc-network:
    driver: bridge
